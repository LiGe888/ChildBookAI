# Lesson 31 benchmark preview. This file is included inside the existing
# server block for 47.98.198.2.

location = /english-picture-book {
    return 301 /english-picture-book/;
}

location = /english-picture-book/ {
    return 302 /english-picture-book/app/static/benchmark.html;
}

# The benchmark header links back to the full library. The minimal preview
# intentionally ships only Lesson 31, so keep that link inside the benchmark.
location = /english-picture-book/app/static/index.html {
    return 302 /english-picture-book/app/static/benchmark.html;
}

location ^~ /english-picture-book/ {
    alias /var/www/english-picture-book/current/;
    autoindex off;

    limit_except GET HEAD {
        deny all;
    }

    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; media-src 'self' blob:; script-src 'self'; style-src 'self'" always;
}
